  school: { data:defSchoolData, label:'Дефицит школ (>1 км)', color:'#F39C12', count:201 },
  med:    { data:defMedData, label:'Дефицит поликлиник (>1.5 км)', color:'#E74C3C', count:345 },
  sport:  { data:defSportData, label:'Дефицит спорта (>1.2 км)', color:'#9B59B6', count:866 },
};

function setDeficit(mode) {
  // Remove previous
  if(defLayer) { try { map.removeLayer(defLayer); } catch(e) {} }
  
  if(defMode === mode) {
    // Toggle off
    defMode = 'off';
    setDistrictFills(true);
    document.querySelectorAll('.def-btn').forEach(b => b.style.opacity='0.35');
    return;
  }
  
  defMode = mode;
  defLayer = L.heatLayer(defModes[mode].data, defOpts).addTo(map);
  setDistrictFills(false);
  
  // Also turn off density heatmaps
  try { 
    if(heatMode !== 'off') {
      map.eachLayer(l => { if(l._heat) try { map.removeLayer(l); } catch(e) {} });
      heatMode = 'off';
    }
  } catch(e) {}
  
  document.querySelectorAll('.def-btn').forEach(b => b.style.opacity='0.35');
  document.querySelector('.def-btn[data-mode="'+mode+'"]').style.opacity='1';
}

// Add buttons
Object.entries(defModes).forEach(([key, cfg]) => {
  const btn = document.createElement('div');
  btn.className = 'dl-item def-btn';
  btn.dataset.mode = key;
  btn.style.cssText = 'cursor:pointer;opacity:0.35;background:rgba(249,65,68,0.08);';
  btn.innerHTML = '<span class="dl-swatch" style="background:'+cfg.color+'"></span>🔻 '+cfg.label+' ('+cfg.count+')';
  btn.onclick = () => setDeficit(key);
  document.getElementById('dLegend').appendChild(btn);
});

<style>
:root {
  --bg: #0F1923;
  --panel: #1A2744;
  --panel2: #213158;
  --accent: #C5A43B;
  --accent-dim: rgba(197,164,59,0.15);
  --text: #E8E8E8;
  --dim: #7B8FAD;
  --red: #E74C3C;
  --orange: #F39C12;
  --green: #2ECC71;
  --blue: #3498DB;
  --purple: #9B59B6;
  --cyan: #1ABC9C;
  --pink: #E91E63;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Montserrat',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }

.app { display:flex; height:100vh; }

/* ── sidebar ── */
.sidebar {
  width:400px; min-width:400px;
  background:var(--panel);
  display:flex; flex-direction:column;
  border-right:1px solid rgba(197,164,59,0.12);
  z-index:1000;
}
.s-head {
  padding:18px 22px 14px;
  border-bottom:1px solid rgba(197,164,59,0.12);
}
.s-head h1 { font-size:15px; font-weight:900; text-transform:uppercase; letter-spacing:.4px; color:var(--accent); }
.s-head p { font-size:10px; color:var(--dim); margin-top:2px; }

/* stats row */
.stats { display:flex; gap:1px; background:rgba(0,0,0,.25); }
.st { flex:1; text-align:center; padding:10px 4px; background:var(--panel); }
.st b { display:block; font-size:17px; font-weight:900; color:var(--accent); }
.st span { font-size:8px; text-transform:uppercase; letter-spacing:.3px; color:var(--dim); }

/* filters */
.filters {
  padding:10px 14px;
  display:flex; flex-wrap:wrap; gap:4px;
  border-bottom:1px solid rgba(197,164,59,0.1);
}
.fbtn {
  display:flex; align-items:center; gap:5px;
  padding:5px 10px; border:none; background:var(--accent-dim);
  color:var(--text); font-family:inherit; font-size:10px; font-weight:700;
  cursor:pointer; border-radius:4px; transition:.15s;
}
.fbtn.off { opacity:.35; background:transparent; }
.fbtn:hover { opacity:1; }
.fdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* district legend */
.district-legend {
  padding:10px 14px;
  border-bottom:1px solid rgba(197,164,59,0.1);
  display:flex; flex-wrap:wrap; gap:4px;
}
.dl-item {
  display:flex; align-items:center; gap:5px;
  padding:4px 8px; border-radius:4px;
  font-size:9px; font-weight:700; cursor:pointer;
  transition:.15s;
}
.dl-item:hover { opacity:.8; }
.dl-swatch { width:12px; height:12px; border-radius:2px; border:1px solid rgba(255,255,255,.15); }

/* list */
.list { flex:1; overflow-y:auto; padding:8px 10px; }
.list::-webkit-scrollbar { width:4px; }
.list::-webkit-scrollbar-thumb { background:rgba(197,164,59,.25); border-radius:2px; }

.card {
  padding:8px 10px; border-radius:5px; cursor:pointer;
  margin-bottom:3px; border-left:3px solid transparent;
  transition:.15s;
}
.card:hover { background:var(--panel2); }
.card.hl { background:var(--accent-dim); border-left-color:var(--accent); }
.card-name { font-size:11px; font-weight:700; }
.card-meta { font-size:9px; color:var(--dim); margin-top:1px; line-height:1.4; }
.card-tags { margin-top:3px; }
.tag { display:inline-block; font-size:8px; padding:1px 5px; border-radius:2px; font-weight:700; margin-right:3px; }
.t-prob { background:rgba(231,76,60,.18); color:var(--red); }
.t-build { background:rgba(243,156,18,.18); color:var(--orange); }
.t-done { background:rgba(46,204,113,.18); color:var(--green); }
.t-plan { background:rgba(52,152,219,.18); color:var(--blue); }
.t-district { background:rgba(255,255,255,.08); color:var(--dim); }

/* ── map ── */
.map-wrap { flex:1; position:relative; }
#map { width:100%; height:100%; }

.custom-pin {
  display:flex; align-items:center; justify-content:center;
  border-radius:50%; border:2px solid rgba(255,255,255,.85);
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  transition:transform .15s;
  font-size:12px; line-height:1;
}
.custom-pin:hover { transform:scale(1.35); z-index:9999!important; }

/* district label on map */
.d-label {
  font-family:'Montserrat',sans-serif;
  font-weight:900; text-transform:uppercase;
  letter-spacing:1.5px; white-space:nowrap;
  text-shadow: 0 0 12px rgba(0,0,0,.9), 0 0 4px rgba(0,0,0,.7);
  pointer-events:none;
}

/* popup */
.leaflet-popup-content-wrapper {
  background:var(--panel)!important; border:1px solid rgba(197,164,59,.25)!important;

.leaflet-popup-tip { background:var(--panel)!important; }
.leaflet-popup-content { margin:10px 14px!important; font-family:'Montserrat',sans-serif!important; font-size:11px!important; line-height:1.5!important; }
.pp-t { font-size:13px; font-weight:800; color:var(--accent); margin-bottom:4px; }
.pp-c { font-size:9px; text-transform:uppercase; letter-spacing:.4px; color:var(--dim); margin-bottom:6px; }

.pp-s { margin-top:6px; padding-top:6px; border-top:1px solid rgba(255,255,255,.08); font-size:9px; color:var(--dim); }

/* mobile */
.mob-toggle { display:none; position:absolute; top:10px; left:10px; z-index:1001; background:var(--panel); border:1px solid rgba(197,164,59,.3); color:var(--accent); width:38px; height:38px; border-radius:6px; font-size:16px; cursor:pointer; }
@media(max-width:860px){
  .sidebar { width:100%; min-width:100%; position:absolute; z-index:1001; transform:translateX(-100%); transition:.3s; }
  .sidebar.open { transform:translateX(0); }
  .mob-toggle { display:flex; align-items:center; justify-content:center; }
}

function setDeficit(mode) {
  // Remove previous
  if(defLayer) { try { map.removeLayer(defLayer); } catch(e) {} }
  
  if(defMode === mode) {
    // Toggle off
    defMode = 'off';
    setDistrictFills(true);
    document.querySelectorAll('.def-btn').forEach(b => b.style.opacity='0.35');
    return;
  }
  
  defMode = mode;
  defLayer = L.heatLayer(defModes[mode].data, defOpts).addTo(map);
  setDistrictFills(false);
  
  // Also turn off density heatmaps
  try { 
    if(heatMode !== 'off') {
      map.eachLayer(l => { if(l._heat) try { map.removeLayer(l); } catch(e) {} });
      heatMode = 'off';
    }
  } catch(e) {}
  
  document.querySelectorAll('.def-btn').forEach(b => b.style.opacity='0.35');
  document.querySelector('.def-btn[data-mode="'+mode+'"]').style.opacity='1';
}

// Add buttons
Object.entries(defModes).forEach(([key, cfg]) => {
  const btn = document.createElement('div');
  btn.className = 'dl-item def-btn';
  btn.dataset.mode = key;
  btn.style.cssText = 'cursor:pointer;opacity:0.35;background:rgba(249,65,68,0.08);';
  btn.innerHTML = '<span class="dl-swatch" style="background:'+cfg.color+'"></span>🔻 '+cfg.label+' ('+cfg.count+')';
  btn.onclick = () => setDeficit(key);
  document.getElementById('dLegend').appendChild(btn);
});

// Don river visible through district boundaries (south edges of right-bank districts)
districtDefs.forEach(d => {
  const poly = L.polygon(d.coords, {
    color: d.color, weight: 2, opacity: .6,
    fillColor: d.color, fillOpacity: d.opacity,
    className: 'district-poly',
    _distId: d.id
  }).addTo(map);
  
  // popup with info
  const info = districtInfo[d.id] || '';
  poly.bindPopup(`<div class="pp-t">${d.name}</div><div class="pp-d">${info}</div>`, {maxWidth:200});

  // label
  const center = poly.getBounds().getCenter();
  const isSub = ["suv","lev","lob"].includes(d.id);
  const fontSize = isSub ? 10 : 9;
  const col = isSub ? d.color : "rgba(255,255,255,.5)";
  L.marker(center, {
    icon: L.divIcon({
      html:`<div class="d-label" style="font-size:${fontSize}px;color:${col}">${d.name}</div>`,
      className:'', iconSize:[120,20], iconAnchor:[60,10]
    }),
    interactive: false
  }).addTo(map);

  districtLayers[d.id] = poly;
});

// District legend in sidebar
var _dLeg = document.getElementById('dLegend');
districtDefs.forEach(d => {
  const el = document.createElement('div');
  el.className = 'dl-item';
  el.innerHTML = `<span class="dl-swatch" style="background:${d.color}"></span>${d.name}`;
  el.onclick = () => map.fitBounds(districtLayers[d.id].getBounds(), {padding:[60,60]});
  _dLeg.appendChild(el);
});

const kgLayer = L.layerGroup();

kindergartens.forEach((s) => {
  const icon = L.divIcon({
    html:'<div class="custom-pin" style="width:18px;height:18px;background:#E67E22;font-size:9px;">👶</div>',
    iconSize:[18,18], className:''
  });
  const m = L.marker([s.lat, s.lon], {icon}).bindPopup(
    '<div class="pp-t">' + s.name + '</div>' +
    '<div class="pp-c">Детский сад</div>' +
    (s.addr ? '<div class="pp-d">' + s.addr + '</div>' : ''),
    {maxWidth:280}
  );
  kgLayer.addLayer(m);
});

const kgToggle = document.createElement('div');
kgToggle.className = 'dl-item';
kgToggle.style.cursor = 'pointer';
kgToggle.style.opacity = '0.35';
kgToggle.innerHTML = '<span class="dl-swatch" style="background:#E67E22"></span>👶 Детсады (' + kindergartens.length + ')';
kgToggle.dataset.on = '0';
kgToggle.onclick = () => {
  if (kgToggle.dataset.on === '1') {
    map.removeLayer(kgLayer);
    kgToggle.dataset.on = '0';
    kgToggle.style.opacity = '0.35';
  } else {
    map.addLayer(kgLayer);
    kgToggle.dataset.on = '1';
    kgToggle.style.opacity = '1';
  }
};
document.getElementById('dLegend').appendChild(kgToggle);

const medHospLayer = L.layerGroup();
const medPolyLayer = L.layerGroup();
// clinics removed

const medCfg = {
  hospital:   {layer: medHospLayer,   color:'#E74C3C', icon:'🏥', size:22, label:'Больницы'},
  polyclinic: {layer: medPolyLayer,   color:'#27AE60', icon:'🏥', size:20, label:'Поликлиники'},

};

medFacilities.forEach(m => {
  const cfg = medCfg[m.cat];
  const icon = L.divIcon({
    html:'<div class="custom-pin" style="width:'+cfg.size+'px;height:'+cfg.size+'px;background:'+cfg.color+';font-size:'+(cfg.size-8)+'px;">'+cfg.icon+'</div>',
    iconSize:[cfg.size,cfg.size], className:''
  });
  const marker = L.marker([m.lat, m.lon], {icon}).bindPopup(
    '<div class="pp-t">' + m.name + '</div>' +
    '<div class="pp-c">' + cfg.label + '</div>' +
    (m.addr ? '<div class="pp-d">' + m.addr + '</div>' : ''),
    {maxWidth:280}
  );
  cfg.layer.addLayer(marker);
});

// Add toggles
const medCats = [
  {key:'hospital', layer:medHospLayer, color:'#E74C3C', icon:'🏥', on:false},
  {key:'polyclinic', layer:medPolyLayer, color:'#27AE60', icon:'🏥', on:false},

];
medCats.forEach(mc => {
  const count = medFacilities.filter(m=>m.cat===mc.key).length;
  const t = document.createElement('div');
  t.className = 'dl-item';
  t.style.cursor = 'pointer';
  t.style.opacity = '0.35';
  t.innerHTML = '<span class="dl-swatch" style="background:'+mc.color+'"></span>'+mc.icon+' '+medCfg[mc.key].label+' ('+count+')';
  t.dataset.on = '0';
  t.onclick = () => {
    if(t.dataset.on==='1'){ map.removeLayer(mc.layer); t.dataset.on='0'; t.style.opacity='0.35'; }
    else{ map.addLayer(mc.layer); t.dataset.on='1'; t.style.opacity='1'; }
  };
  document.getElementById('dLegend').appendChild(t);
});

  if(sportToggle.dataset.on==='1'){ map.removeLayer(sportLayer); sportToggle.dataset.on='0'; sportToggle.style.opacity='0.35'; }

};
document.getElementById('dLegend').appendChild(sportToggle);
